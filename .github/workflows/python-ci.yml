name: CI for python source
on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ## only need this if no other triggers are implemented
      # trigger:
      #   description: 'Set this to call the runner'
      #   default:     'on'
      #   required:    true
      branch:
        description: 'Which branch should be tested?'
        default:     'master'
        required:    true
jobs:
################################################################################################################################
# Pipe for setup
################################################################################################################################
  pipe-setup:
    runs-on: ubuntu-20.04
    env:
      lang:     python
      app_name: phpytex
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Install system requirements via apt-get
        run: |
          sudo apt-get install -y dos2unix
          sudo apt-get install -y apt-utils
          sudo apt-get install -y zip unzip xz-utils
          sudo apt-get clean
      - name: Grant execution rights
        run: |
          chmod +x scripts/*.sh
      - # only do perform this in one job
        name: Run setup
        run: |
          ./scripts/build.sh --lang ${{ env.lang }} --venv true --mode setup
          ! [[ -d build ]] && echo "Local python environment not created!" && exit 1
          [[ -d build ]] && echo "Local python environment successfully created"
      - name: Create binary artefact
        run: |
          ./scripts/build.sh --lang ${{ env.lang }} --mode dist
          ! [[ -f dist/${{ env.app_name }} ]] && echo "Binary not created!" && exit 1
          [[ -f dist/${{ env.app_name }} ]] && echo "Binary successfully created"
    # - # upload build artefacts
    #   name: Upload local build
    #   uses: actions/upload-artifact@v2
    #   with:
    #     name: build_setup
    #     path: |-
    #       build
    #       dist
################################################################################################################################
# Pipe for unit tests
################################################################################################################################
