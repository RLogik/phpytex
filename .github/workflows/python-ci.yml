      - name: Check if programme as binary artefact works
        run: |
          source scripts/.lib.sh && use_python_venv_true && activate_python_venv
          dist/${{ env.app_name }} help
          echo "----"
          version="$( cat dist/VERSION )";
          output="$( dist/${{ env.app_name }} version )";
          ! [[ "$output" == "$version" ]] && echo "output=$output=/=$version" && exit 1
