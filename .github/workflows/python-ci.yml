  #         chmod +x scripts/*.sh
  #     - name: Download build artefacts
  #       uses: actions/download-artifact@v2
  #       with:
  #         name: build_setup
      - name: Check if open source code works
        run: |
          source scripts/.lib.sh && use_python_venv_true && activate_python_venv
          python3 src/main.py help
          echo "----"
          version="x.x.x";
          output="$( python3 src/main.py version )";
          ! [[ "$output" == "$version" ]] && echo "output=$output=/=$version" && exit 1
          echo "$output";
      - name: Run unit tests
        run: |
          ./scripts/test.sh --lang ${{ env.lang }} --mode unit
