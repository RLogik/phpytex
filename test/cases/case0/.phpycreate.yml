ignore:      false
################################################################################
# COMPILE OPTIONS
################################################################################
compile:
  legacy:         true
  root:           root.tex
  output:         main.tex
  export-params:  src.parameters
  debug:          false
  compile-latex:  true
  insert-bib:     true
  comments:       auto
  show-structure: true
  max-length:     10000
  tabs:           false
  spaces:         4
  seed:           81004467
################################################################################
# STAMP OPTIONS
################################################################################
stamp:
  file: stamp.tex
  overwrite: true
  options:
    author:    Max Mustermann
    created:   27.08.2021
    edited:    28.08.2021
    title:     &ref_title The stages of artificial intelligence beyond human intelligence
    institute: Faculty of mathematics
################################################################################
# ARTICLE PARAMETERS
################################################################################
parameters:
  file:      parameters.tex
  overwrite: true
  options:
    FONT_SIZE: 12pt
    TITLE:     *ref_title
    KEYWORDS:
      - ai
      - computer science
      - research
################################################################################
# DOCUMENT TREE
################################################################################
files:
  - root.tex
