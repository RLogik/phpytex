openapi: 3.0.3
info:
  version: x.y.z
  title: Schemata for test config
  description: |-
    Schemata for configuration of tests.
servers:
  - url: "."
paths: {}
definitions:
    FileString: &file_string
      description: Data type for a string to be the base name of a file.
      type: string
      pattern: '^[^\\\/]*\.[^\\\/]+$'
    PathToFileString: &path_to_file_string
      description: Data type for a string to be a path to a file.
      type: string
      pattern: '^[^\\\/]+([\\\/][^\\\/]+)*\.[^\\\/]+$'
    PathToDirString: &path_to_dir_string
      description: Data type for a string to be a path to a directory.
      type: string
      pattern: '^[^\\\/]+([\\\/][^\\\/]+)*$'
    PythonImportString: &python_import_string
      description: Data type for a string to constitute an import 'path' in python.
      type: string
      pattern: '^[\w\_]+(\.[\w\_]+)*$'
components:
  schemas:
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    # Structure of tests config file
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    TestProgrammeConfig:
      description: |-
        Configuration for automatic testing.
      type: object
      required:
        - cases
      properties:
        paths:
          $ref: "#/components/schemas/TestProgrammePaths"
        cases:
          description: List of test cases.
          type: array
          items:
            $ref: "#/components/schemas/TestCase"
      additionalProperties: false
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    # Test programme paths
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    TestProgrammePaths:
      description: |-
        Paths for setup.
      type: object
      required:
        - logging
        - path-cases
        - path-sandbox
      properties:
        logging:
          <<: *path_to_file_string
          description: Path to file for logging (dev mode only).
        path-cases:
          <<: *path_to_dir_string
          description: Path to test cases (scenarios).
        path-sandbox:
          <<: *path_to_dir_string
          description: Path to sandbox for temporary execution of tests on scenarios.
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    # Information about test case
    # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
    TestCase:
      description: |-
        Configuration of test case.
      type: object
      required:
        - path
      properties:
        path:
          <<: *path_to_dir_string
          description: Path to test scenario.
      additionalProperties: false
