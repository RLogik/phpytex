ignore:      false
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TRANSPILATION SETTINGS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
transpile:
  options:
    root: root.tex
    output: main.tex
    debug: false
    compile-latex: true
    insert-bib: true
    comments: auto
    show-tree: true
    max-length: 10000
    tabs: false
    spaces: 4
    seed: 81004467
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# STAMP SETTINGS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
stamp:
  file: stamp.tex
  overwrite: true
  options:
    author:    Max Mustermann
    created:   27.08.2021
    edited:    28.08.2021
    title:     &ref_title The stages of artificial intelligence beyond human intelligence
    institute: Faculty of mathematics
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# GLOBAL PARAMETERS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
parameters:
  overwrite: true
  file: src.parameters
  options:
    FONT_SIZE: 12pt
    TITLE:     *ref_title
    KEYWORDS:
      - ai
      - computer science
      - research
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# PROJECT TREE
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
files:
  - root.tex
